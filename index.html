<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">

    <title>劉齊 - 自我介紹</title>
    <style>
        /* 基礎設定 */
        body { 
            margin: 0; 
            background-color: #363636; /* 深灰底色 */
            color: #ffffff; 
            font-family: 'Arial', sans-serif; 
            padding-right: 200px; 
        }

        /* 左上角 Logo */
        header { padding: 30px 50px; }
        .logo { 
            font-size: 28px; 
            font-family: 'Arial Black', Impact, sans-serif; 
            font-weight: 900;
            color: #ff3333; 
            letter-spacing: 2px;
        }

        /* 右側垂直滿版導覽列 */
        nav { 
            position: fixed; 
            top: 0; right: 0; 
            width: 200px; height: 100vh; 
            background-color: #222222; 
            display: flex; flex-direction: column; 
            border-left: 2px solid #111;
        }

        nav a { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            color: #ffffff; text-decoration: none; 
            font-family: 'Arial Black', Impact, sans-serif; font-size: 20px; letter-spacing: 2px; 
            transition: background-color 0.3s, color 0.3s; 
            border-bottom: 1px solid #333; 
        }
        nav a:last-child { border-bottom: none; }

        /* 導覽列選中狀態 (純黃色配黑字) */
        nav a:hover, nav a.active { 
            background-color: #FFFF00; 
            color: #000000; 
        }

        /* 主要內容區塊 */
        main { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 50px 20px; gap: 40px; 
        }

        /* ================= 關於我卡片排版 ================= */
        .about-card {
            display: flex; 
            align-items: center; 
            gap: 40px; 
            background-color: #222222; 
            padding: 40px;
            border-radius: 15px; 
            max-width: 800px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border-left: 5px solid #FFFF00; 
        }

        /* 大頭貼外框設定 */
        .profile-pic {
            flex-shrink: 0; 
            width: 200px;
            height: 200px;
            border-radius: 50%; 
            overflow: hidden;
            border: 4px solid #FFFF00; 
        }

        /* 大頭貼圖片本身 */
        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* 文字區塊設定 */
        .about-text {
            text-align: left;
            line-height: 1.8;
            font-size: 16px;
        }
        .about-text h3 {
            color: #FFFF00; 
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .about-text h4 {
            color: #aaaaaa; 
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>

        <div class="about-card">
            
            <div class="profile-pic">
                <img src="me.jpg" alt="大頭貼">
            </div>

                <p>📍 <b>技能專長：</b> Blender、Shader 節點邏輯</p>

            </div>

        </div>
    </main>

</body>
</html>
